    const ApplyModal = ({ open, onClose, audience: initialAudience = "engineer" }) => {
      const [step, setStep] = useState(() => {
        const saved = localStorage.getItem("apply-step");
        return saved ? parseInt(saved) : 0;
      });
      const [audience, setAudience] = useState(initialAudience);
      const [submitting, setSubmitting] = useState(false);
      const [form, setForm] = useState({
        name: "", email: "", company: "", role: "",
        years: "", stack: [], location: "",
        motivation: "",
      });

      useEffect(() => {
        localStorage.setItem("apply-step", String(step));
      }, [step]);

      if (!open) return null;

      const stacks = ["Backend", "Frontend", "Full-stack", "Mobile", "Infra/SRE", "Data", "ML"];
      const toggleStack = (s) => {
        setForm(f => ({
          ...f,
          stack: f.stack.includes(s) ? f.stack.filter(x => x !== s) : [...f.stack, s]
        }));
      };

      const steps = audience === "engineer"
        ? ["Audience", "About you", "Your stack", "Review"]
        : ["Audience", "About you", "Hiring needs", "Review"];

      const close = () => { onClose(); };
      const next = () => setStep(Math.min(step + 1, steps.length));
      const back = () => setStep(Math.max(step - 1, 0));
      const reset = () => { setStep(0); setForm({ name: "", email: "", company: "", role: "", years: "", stack: [], location: "", motivation: "" }); };

      const handleSubmit = async () => {
        setSubmitting(true);
        const FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLSeWgBSEeCorN8I4lDwoYUz-UauFp0uOPPNzDBH9mjxh21MX6w/formResponse";
        const body = new URLSearchParams();
        body.append("entry.366448080", audience === "engineer" ? "I'm a Brazilian engineer" : "I'm hiring engineers");
        body.append("entry.35330576", form.name);
        body.append("entry.1536668570", form.email);
        if (audience === "engineer") {
          body.append("entry.1804376988", form.years);
          body.append("entry.1714161214", form.location);
          form.stack.forEach(s => body.append("entry.1729681152", s));
          body.append("entry.2052289103", form.motivation);
        } else {
          body.append("entry.1882783782", form.company);
          body.append("entry.1183692460", form.role);
          form.stack.forEach(s => body.append("entry.1785383490", s));
          body.append("entry.26120610", form.motivation);
        }
        try {
          await fetch(FORM_URL, { method: "POST", mode: "no-cors", body });
        } catch (_) { }
        setSubmitting(false);
        next();
      };

      return (
        <div className="modal-backdrop" onClick={close}>
          <div className="modal" onClick={(e) => e.stopPropagation()}>
            <button className="modal-close" onClick={close} aria-label="Close"><Icon name="close" size={16} /></button>

            {step < steps.length && (
              <div className="modal-steps">
                {steps.map((_, i) => (
                  <div key={i} className={i === step ? "active" : i < step ? "done" : ""} />
                ))}
              </div>
            )}

            {step === 0 && (
              <>
                <h3>Who are you?</h3>
                <p className="sub">Pick the path that fits. You can switch later.</p>
                <div style={{ display: "grid", gap: 10 }}>
                  <button
                    className={`chip ${audience === "engineer" ? "selected" : ""}`}
                    style={{ padding: "18px 20px", textAlign: "left", borderRadius: 12, fontSize: 15 }}
                    onClick={() => setAudience("engineer")}
                  >
                    <div style={{ fontWeight: 500, marginBottom: 4 }}>I&apos;m a Brazilian engineer</div>
                    <div style={{ fontSize: 13, opacity: 0.7 }}>Applying to work remotely with North American companies.</div>
                  </button>
                  <button
                    className={`chip ${audience === "company" ? "selected" : ""}`}
                    style={{ padding: "18px 20px", textAlign: "left", borderRadius: 12, fontSize: 15 }}
                    onClick={() => setAudience("company")}
                  >
                    <div style={{ fontWeight: 500, marginBottom: 4 }}>I&apos;m hiring engineers</div>
                    <div style={{ fontSize: 13, opacity: 0.7 }}>Looking to onboard cohort engineers onto my team.</div>
                  </button>
                </div>
                <div className="modal-actions">
                  <button className="btn btn-ghost" onClick={close}>Cancel</button>
                  <button className="btn btn-primary" onClick={next}>Continue <Icon name="arrow-right" size={14} /></button>
                </div>
              </>
            )}

            {step === 1 && (
              <>
                <h3>A bit about you.</h3>
                <p className="sub">We&apos;ll use this to route your application.</p>
                <div className="field-row">
                  <div className="field">
                    <label>Full name</label>
                    <input value={form.name} onChange={(e) => setForm({ ...form, name: e.target.value })} placeholder="Maria Silva" />
                  </div>
                  <div className="field">
                    <label>Email</label>
                    <input type="email" value={form.email} onChange={(e) => setForm({ ...form, email: e.target.value })} placeholder="maria@example.com" />
                  </div>
                </div>
                {audience === "engineer" ? (
                  <div className="field-row">
                    <div className="field">
                      <label>Years of experience</label>
                      <select value={form.years} onChange={(e) => setForm({ ...form, years: e.target.value })}>
                        <option value="">Select</option>
                        <option>3–5 years</option>
                        <option>5–8 years</option>
                        <option>8–12 years</option>
                        <option>12+ years</option>
                      </select>
                    </div>
                    <div className="field">
                      <label>Current city</label>
                      <input value={form.location} onChange={(e) => setForm({ ...form, location: e.target.value })} placeholder="São Paulo, BR" />
                    </div>
                  </div>
                ) : (
                  <div className="field-row">
                    <div className="field">
                      <label>Company</label>
                      <input value={form.company} onChange={(e) => setForm({ ...form, company: e.target.value })} placeholder="Northwind Inc." />
                    </div>
                    <div className="field">
                      <label>Your role</label>
                      <input value={form.role} onChange={(e) => setForm({ ...form, role: e.target.value })} placeholder="Head of Engineering" />
                    </div>
                  </div>
                )}
                <div className="modal-actions">
                  <button className="btn btn-ghost" onClick={back}>Back</button>
                  <button className="btn btn-primary" onClick={next}>Continue <Icon name="arrow-right" size={14} /></button>
                </div>
              </>
            )}

            {step === 2 && (
              <>
                <h3>{audience === "engineer" ? "What do you build?" : "Who are you hiring?"}</h3>
                <p className="sub">Pick everything that applies.</p>
                <div className="chips" style={{ marginBottom: 18 }}>
                  {stacks.map(s => (
                    <button key={s}
                      className={`chip ${form.stack.includes(s) ? "selected" : ""}`}
                      onClick={() => toggleStack(s)}>{s}</button>
                  ))}
                </div>
                <div className="field">
                  <label>{audience === "engineer" ? "Why Code in Canada?" : "What roles are hardest to fill?"}</label>
                  <textarea
                    value={form.motivation}
                    onChange={(e) => setForm({ ...form, motivation: e.target.value })}
                    placeholder={audience === "engineer" ? "Tell us in a few sentences…" : "Tell us about the gaps on your team…"}
                  />
                </div>
                <div className="modal-actions">
                  <button className="btn btn-ghost" onClick={back}>Back</button>
                  <button className="btn btn-primary" onClick={next}>Continue <Icon name="arrow-right" size={14} /></button>
                </div>
              </>
            )}

            {step === 3 && (
              <>
                <h3>Review &amp; submit.</h3>
                <p className="sub">One quick check before you send.</p>
                <div style={{ background: "var(--bg-sunken)", borderRadius: 10, padding: 16, fontSize: 14, marginBottom: 18 }}>
                  <div style={{ display: "grid", gap: 8 }}>
                    <div style={{ display: "flex", justifyContent: "space-between" }}>
                      <span style={{ color: "var(--muted)" }}>Path</span>
                      <span style={{ fontWeight: 500 }}>{audience === "engineer" ? "Engineer application" : "Hiring partnership"}</span>
                    </div>
                    <div style={{ display: "flex", justifyContent: "space-between" }}>
                      <span style={{ color: "var(--muted)" }}>Name</span>
                      <span style={{ fontWeight: 500 }}>{form.name || "—"}</span>
                    </div>
                    <div style={{ display: "flex", justifyContent: "space-between" }}>
                      <span style={{ color: "var(--muted)" }}>Email</span>
                      <span style={{ fontWeight: 500 }}>{form.email || "—"}</span>
                    </div>
                    <div style={{ display: "flex", justifyContent: "space-between" }}>
                      <span style={{ color: "var(--muted)" }}>Stack</span>
                      <span style={{ fontWeight: 500 }}>{form.stack.join(", ") || "—"}</span>
                    </div>
                  </div>
                </div>
                <div className="modal-actions">
                  <button className="btn btn-ghost" onClick={back}>Back</button>
                  <button className="btn btn-primary" onClick={handleSubmit} disabled={submitting}>{submitting ? "Sending…" : "Submit application"} <Icon name="arrow-right" size={14} /></button>
                </div>
              </>
            )}

            {step >= steps.length && (
              <>
                <div className="success">
                  <div className="checkmark"><Icon name="check" size={28} /></div>
                  <h3 style={{ marginBottom: 8 }}>You&apos;re in the queue.</h3>
                  <p style={{ color: "var(--muted)", fontSize: 15, maxWidth: 360, margin: "0 auto" }}>
                    We review applications weekly. You&apos;ll hear back within 5 business days — look for an email from <strong style={{ color: "var(--ink)" }}>hello@codein.ca</strong>.
                  </p>
                  <div style={{ display: "flex", gap: 10, justifyContent: "center", marginTop: 28 }}>
                    <button className="btn btn-ghost" onClick={() => { reset(); }}>Submit another</button>
                    <button className="btn btn-primary" onClick={() => { reset(); close(); }}>Done</button>
                  </div>
                </div>
              </>
            )}
          </div>
        </div>
      );
    };

    window.ApplyModal = ApplyModal;


    // === src/tweaks.jsx ===
    const Tweaks = ({ tweaks, setTweaks, onClose }) => {
      const accents = [
        { id: "coral", color: "#E4572E" },
        { id: "maple", color: "#C33A2B" },
        { id: "sun", color: "#E8B84A" },
        { id: "sky", color: "#2E6AA8" },
      ];
      const heroes = [
        { id: "editorial", label: "Editorial" },
        { id: "direct", label: "Direct" },
        { id: "bold", label: "Bold" },
      ];
      const densities = [
        { id: "compact", label: "Tight" },
        { id: "comfortable", label: "Default" },
        { id: "spacious", label: "Airy" },
      ];

      const update = (k, v) => {
        const next = { ...tweaks, [k]: v };
        setTweaks(next);
        window.parent.postMessage({ type: "__edit_mode_set_keys", edits: { [k]: v } }, "*");
      };

      return (
        <div className="tweaks">
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
            <h4 style={{ margin: 0 }}>Tweaks</h4>
            <button onClick={onClose} style={{ color: "var(--muted)", padding: 4 }}><Icon name="close" size={14} /></button>
          </div>

          <div className="tweak-group">
            <label>Accent color</label>
            <div className="tweak-swatches">
              {accents.map(a => (
                <button key={a.id}
                  className={`tweak-swatch ${tweaks.accent === a.id ? "active" : ""}`}
                  style={{ background: a.color }}
                  onClick={() => update("accent", a.id)}
                  aria-label={a.id}
                />
              ))}
            </div>
          </div>

          <div className="tweak-group">
            <label>Hero headline</label>
            <div className="tweak-segments">
              {heroes.map(h => (
                <button key={h.id}
                  className={tweaks.heroVariant === h.id ? "active" : ""}
                  onClick={() => update("heroVariant", h.id)}>{h.label}</button>
              ))}
            </div>
          </div>

          <div className="tweak-group">
            <label>Density</label>
            <div className="tweak-segments">
              {densities.map(d => (
                <button key={d.id}
                  className={tweaks.density === d.id ? "active" : ""}
                  onClick={() => update("density", d.id)}>{d.label}</button>
              ))}
            </div>
          </div>

          <div className="tweak-group tweak-toggle">
            <label style={{ margin: 0 }}>Show stats row</label>
            <button
              className={`switch ${tweaks.showStats ? "on" : ""}`}
              onClick={() => update("showStats", !tweaks.showStats)}
              aria-pressed={tweaks.showStats}
            />
          </div>
        </div>
      );
    };

    window.Tweaks = Tweaks;




    // === src/app.jsx ===
    const Footer = () => (
      <footer className="footer">
        <div className="container">
          <div className="footer-grid">
            <div className="footer-brand">
              <img src="assets/logo-codein-recruiting.png" alt="Code in Canada Recruiting" style={{ height: 40, width: "auto", filter: "brightness(0) invert(1)", opacity: 0.9, marginBottom: 16 }} />
              <p>
                A recruiting company connecting rigorously-vetted Brazilian engineers with
                North American teams. Remote-first. Three cohorts a year.
              </p>
              <div style={{ marginTop: 24, display: "flex", gap: 12 }}>
                <div className="pill" style={{ background: "rgba(246,243,236,0.06)", color: "rgba(246,243,236,0.7)", borderColor: "rgba(246,243,236,0.12)" }}>
                  <span className="bullet" style={{ background: "var(--accent)" }}></span>
                  Now accepting Cohort 04
                </div>
              </div>
            </div>
            <div className="footer-col">
              <h4>Program</h4>
              <ul>
                <li><a href="#how">How it works</a></li>
                <li><a href="#talent">For companies</a></li>
                <li><a href="#talent">For engineers</a></li>
              </ul>
            </div>
            <div className="footer-col">
              <h4>Company</h4>
              <ul>
                <li><a href="#">About</a></li>
                <li><a href="#">Stories</a></li>
                <li><a href="#">Press</a></li>
                <li><a href="#">Contact</a></li>
              </ul>
            </div>
            <div className="footer-col">
              <h4>Resources</h4>
              <ul>
                <li><a href="#">Engineer handbook</a></li>
                <li><a href="#">Employer brief</a></li>
                <li><a href="#">Remote work guide</a></li>
                <li><a href="#">Alumni</a></li>
              </ul>
            </div>
          </div>

          <div className="footer-bottom">
            <div>© 2026 Code in Canada Inc.</div>
            <div>Toronto · São Paulo</div>
            <div>Privacy · Terms · hello@codein.ca</div>
          </div>
        </div>
      </footer>
    );

    const CTABand = ({ onApply }) => (
      <section className="cta-band">
        <div className="container" style={{ position: "relative", zIndex: 1 }}>
          <div style={{ maxWidth: 880 }}>
            <div className="eyebrow" style={{ color: "rgba(246,243,236,0.6)", marginBottom: 24 }}>
              <span className="dot"></span>Cohort 04 · Closes May 14
            </div>
            <h2>
              The <em>next</em> great engineer<br />
              on your team is already<br />
              writing code tonight.
            </h2>
            <p>
              Just in São Paulo, or Rio, or Belo Horizonte. Apply to Cohort 04 — or reach out to
              partner with us as a hiring company.
            </p>
            <div className="cta-band-actions">
              <button className="btn btn-primary btn-lg" onClick={onApply}>
                Apply to Cohort 04 <Icon name="arrow-right" size={15} />
              </button>
              <a href="#how" className="btn btn-ghost btn-lg">
                Hire from Code in Canada <Icon name="arrow-upright" size={14} />
              </a>
            </div>
          </div>
        </div>
        <div className="cta-watermark">ca</div>
      </section>
    );

    const App = () => {
      const [modalOpen, setModalOpen] = useState(false);
      const [tweaks, setTweaks] = useState(window.TWEAK_DEFAULTS);
      const [tweaksOpen, setTweaksOpen] = useState(false);
      const [activeSection, setActiveSection] = useState("program");

      // Apply tweaks to root
      useEffect(() => {
        document.body.setAttribute("data-accent", tweaks.accent);
        document.body.setAttribute("data-density", tweaks.density);
      }, [tweaks]);

      // Edit-mode protocol
      useEffect(() => {
        const handler = (e) => {
          if (!e.data || typeof e.data !== "object") return;
          if (e.data.type === "__activate_edit_mode") setTweaksOpen(true);
          if (e.data.type === "__deactivate_edit_mode") setTweaksOpen(false);
          if (e.data.type === "__edit_mode_keys") {
            if (e.data.keys) setTweaks(t => ({ ...t, ...e.data.keys }));
          }
        };
        window.addEventListener("message", handler);
        window.parent.postMessage({ type: "__edit_mode_available" }, "*");
        return () => window.removeEventListener("message", handler);
      }, []);

      // Section-spy for nav highlighting
      useEffect(() => {
        const ids = ["program", "how", "talent", "stories", "faq"];
        const observer = new IntersectionObserver(
          (entries) => {
            entries.forEach(e => {
              if (e.isIntersecting) setActiveSection(e.target.id);
            });
          },
          { rootMargin: "-40% 0px -50% 0px", threshold: 0 }
        );
        ids.forEach(id => {
          const el = document.getElementById(id);
          if (el) observer.observe(el);
        });
        return () => observer.disconnect();
      }, []);

      const onApply = () => setModalOpen(true);

      return (
        <>
          <Nav onApply={onApply} activeSection={activeSection} />
          <main id="program">
            <Hero onApply={onApply} variant={tweaks.heroVariant} />
            <Ticker />
            {tweaks.showStats && <Stats />}
            <LogoRow />
            <div className="editorial-strip">
              <img src="assets/1.jpg" alt="Engineers on the move" />
            </div>
            <How onApply={onApply} />
            <Talent onApply={onApply} />
            <Stories />
            <FAQ />
            <CTABand onApply={onApply} />
          </main>
          <Footer />

          <ApplyModal open={modalOpen} onClose={() => setModalOpen(false)} />

          {tweaksOpen && (
            <Tweaks tweaks={tweaks} setTweaks={setTweaks} onClose={() => setTweaksOpen(false)} />
          )}
        </>
      );
    };

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);


  </script>
</body>

</html>
