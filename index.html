// Shared primitives + icons
const { useState, useEffect, useRef, useMemo } = React;

// Minimal line icons, drawn in code — no emoji, no complex SVGs
const Icon = ({ name, size = 18, stroke = 1.6 }) => {
  const s = size;
  const common = {
    width: s, height: s, viewBox: "0 0 24 24",
    fill: "none", stroke: "currentColor", strokeWidth: stroke,
    strokeLinecap: "round", strokeLinejoin: "round"
  };
  switch (name) {
    case "arrow-right":
      return <svg {...common}><path d="M5 12h14M13 6l6 6-6 6"/></svg>;
    case "arrow-upright":
      return <svg {...common}><path d="M7 17L17 7M8 7h9v9"/></svg>;
    case "plus":
      return <svg {...common}><path d="M12 5v14M5 12h14"/></svg>;
    case "close":
      return <svg {...common}><path d="M6 6l12 12M6 18L18 6"/></svg>;
    case "check":
      return <svg {...common}><path d="M5 12l5 5L20 7"/></svg>;
    case "globe":
      return <svg {...common}><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3c3 3 3 15 0 18M12 3c-3 3-3 15 0 18"/></svg>;
    case "code":
      return <svg {...common}><path d="M8 6l-5 6 5 6M16 6l5 6-5 6M14 4l-4 16"/></svg>;
    case "chat":
      return <svg {...common}><path d="M21 12a8 8 0 1 1-3.2-6.4L21 4l-1.2 3.8A8 8 0 0 1 21 12z"/></svg>;
    case "briefcase":
      return <svg {...common}><rect x="3" y="7" width="18" height="13" rx="2"/><path d="M8 7V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M3 13h18"/></svg>;
    case "clock":
      return <svg {...common}><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>;
    case "spark":
      return <svg {...common}><path d="M12 3v4M12 17v4M3 12h4M17 12h4M6 6l2.5 2.5M15.5 15.5L18 18M6 18l2.5-2.5M15.5 8.5L18 6"/></svg>;
    case "compass":
      return <svg {...common}><circle cx="12" cy="12" r="9"/><path d="M15 9l-2 6-6 2 2-6z"/></svg>;
    case "shield":
      return <svg {...common}><path d="M12 3l8 3v6c0 5-4 8-8 9-4-1-8-4-8-9V6z"/></svg>;
    case "doc":
      return <svg {...common}><path d="M14 3H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9zM14 3v6h6M8 13h8M8 17h6"/></svg>;
    default: return null;
  }
};

const ApplyModal = ({ open, onClose, audience: initialAudience = "engineer" }) => {
  const [step, setStep] = useState(() => {
    const saved = localStorage.getItem("apply-step");
    return saved ? parseInt(saved) : 0;
  });
  const [audience, setAudience] = useState(initialAudience);
  const [form, setForm] = useState({
    name: "", email: "", company: "", role: "",
    years: "", stack: [], location: "",
    motivation: "",
  });

  useEffect(() => {
    localStorage.setItem("apply-step", String(step));
  }, [step]);

  if (!open) return null;

  const stacks = ["Backend", "Frontend", "Full-stack", "Mobile", "Infra/SRE", "Data", "ML"];
  const toggleStack = (s) => {
    setForm(f => ({
      ...f,
      stack: f.stack.includes(s) ? f.stack.filter(x => x !== s) : [...f.stack, s]
    }));
  };

  const steps = audience === "engineer"
    ? ["Audience", "About you", "Your stack", "Review"]
    : ["Audience", "About you", "Hiring needs", "Review"];

  const close = () => { onClose(); };
  const next = () => setStep(Math.min(step + 1, steps.length));
  const back = () => setStep(Math.max(step - 1, 0));
  const reset = () => { setStep(0); setForm({ name:"", email:"", company:"", role:"", years:"", stack:[], location:"", motivation:"" }); };

  return (
    <div className="modal-backdrop" onClick={close}>
      <div className="modal" onClick={(e) => e.stopPropagation()}>
        <button className="modal-close" onClick={close} aria-label="Close"><Icon name="close" size={16}/></button>

        {step < steps.length && (
          <div className="modal-steps">
            {steps.map((_, i) => (
              <div key={i} className={i === step ? "active" : i < step ? "done" : ""} />
            ))}
          </div>
        )}

        {step === 0 && (
          <>
            <h3>Who are you?</h3>
            <p className="sub">Pick the path that fits. You can switch later.</p>

              <button
                className={`chip ${audience === "engineer" ? "selected" : ""}`}

              <button

              <button className="btn btn-ghost" onClick={close}>Cancel</button>
              <button className="btn btn-primary" onClick={next}>Continue <Icon name="arrow-right" size={14}/></button>
            </div>
          </>
        )}

        {step === 1 && (
          <>
            <h3>A bit about you.</h3>
            <p className="sub">We&apos;ll use this to route your application.</p>
            <div className="field-row">
              <div className="field">
                <label>Full name</label>
                <input value={form.name} onChange={(e) => setForm({ ...form, name: e.target.value })} placeholder="Maria Silva" />
              </div>
              <div className="field">
                <label>Email</label>
                <input type="email" value={form.email} onChange={(e) => setForm({ ...form, email: e.target.value })} placeholder="maria@example.com" />
              </div>
            </div>

              <div style={{ display: "grid", gap: 8 }}>
                <div style={{ display: "flex", justifyContent: "space-between" }}>
                  <span style={{ color: "var(--muted)" }}>Path</span>
                  <span style={{ fontWeight: 500 }}>{audience === "engineer" ? "Engineer application" : "Hiring partnership"}</span>
                </div>
                <div style={{ display: "flex", justifyContent: "space-between" }}>
                  <span style={{ color: "var(--muted)" }}>Name</span>
                  <span style={{ fontWeight: 500 }}>{form.name || "—"}</span>
                </div>
                <div style={{ display: "flex", justifyContent: "space-between" }}>
                  <span style={{ color: "var(--muted)" }}>Email</span>
                  <span style={{ fontWeight: 500 }}>{form.email || "—"}</span>
                </div>
                <div style={{ display: "flex", justifyContent: "space-between" }}>
                  <span style={{ color: "var(--muted)" }}>Stack</span>
                  <span style={{ fontWeight: 500 }}>{form.stack.join(", ") || "—"}</span>
                </div>
              </div>
            </div>
            <div className="modal-actions">
              <button className="btn btn-ghost" onClick={back}>Back</button>
              <button className="btn btn-primary" onClick={next}>Submit application <Icon name="arrow-right" size={14}/></button>
            </div>
          </>
        )}

        {step >= steps.length && (
          <>
            <div className="success">
              <div className="checkmark"><Icon name="check" size={28} /></div>
              <h3 style={{ marginBottom: 8 }}>You&apos;re in the queue.</h3>
              <p style={{ color: "var(--muted)", fontSize: 15, maxWidth: 360, margin: "0 auto" }}>

              </p>
              <div style={{ display: "flex", gap: 10, justifyContent: "center", marginTop: 28 }}>

            </div>
          </>
        )}
      </div>
    </div>
  );
};

window.ApplyModal = ApplyModal;

const Tweaks = ({ tweaks, setTweaks, onClose }) => {
  const accents = [
    { id: "coral", color: "#E4572E" },
    { id: "maple", color: "#C33A2B" },
    { id: "sun",   color: "#E8B84A" },

    { id: "editorial", label: "Editorial" },

  const update = (k, v) => {

            <button key={a.id}

      <div className="tweak-group tweak-toggle">
        <label style={{ margin: 0 }}>Show stats row</label>
        <button
          className={`switch ${tweaks.showStats ? "on" : ""}`}
          onClick={() => update("showStats", !tweaks.showStats)}
          aria-pressed={tweaks.showStats}
        />
      </div>
    </div>
  );
};

// === src/flow.jsx ===
const FlowJourneyMap = ({ stepIdx }) => {
  const W = 400, H = 360;
  const SP = { x: 318, y: 295 };
  const TO = { x: 76, y: 58 };
  const CP = { x: 52, y: 210 };

  const B = (t, p0, p1, p2) => ({
    x: (1-t)*(1-t)*p0.x + 2*(1-t)*t*p1.x + t*t*p2.x,
    y: (1-t)*(1-t)*p0.y + 2*(1-t)*t*p1.y + t*t*p2.y,
  });

  const checkpoints = [0, 0.2, 0.4, 0.6, 0.8, 1].map((t, i) => ({ ...B(t, SP, CP, TO), t, i }));
  const traveler = checkpoints[stepIdx];
  const fillT = stepIdx / 5;

  const dotGrid = [];
  for (let r = 0; r < 7; r++)
    for (let c = 0; c < 8; c++)
      dotGrid.push({ x: c * 52 + 22, y: r * 52 + 22 });

  return (
    <div className="flow-map-wrap" style={{
      background: "rgba(246,243,236,0.03)",
      border: "1px solid rgba(246,243,236,0.07)",
      borderRadius: 16, padding: 8,
      display: "flex", justifyContent: "center", alignItems: "center",
    }}>
      <svg width={W} height={H} viewBox={`0 0 ${W} ${H}`} style={{ display: "block", overflow: "visible" }}>
        {dotGrid.map((d, i) => (
          <circle key={i} cx={d.x} cy={d.y} r={1.2} style={{ fill: "rgba(246,243,236,0.05)" }} />
        ))}

        {/* Ghost path */}
        <path d={`M ${SP.x} ${SP.y} Q ${CP.x} ${CP.y} ${TO.x} ${TO.y}`}
          fill="none" stroke="rgba(246,243,236,0.08)" strokeWidth="1.5" strokeDasharray="5 5" />

        {/* Progress path */}
        <path d={`M ${SP.x} ${SP.y} Q ${CP.x} ${CP.y} ${TO.x} ${TO.y}`}
          fill="none" strokeWidth="2" pathLength="1"
          strokeDasharray="1" strokeDashoffset={1 - fillT}
          style={{ stroke: "rgba(228,87,46,0.65)", transition: "stroke-dashoffset .7s ease" }} />

        {/* Checkpoints */}
        {checkpoints.map(({ x, y, i }) => {
          const done = i <= stepIdx;
          const active = i === stepIdx;
          return (
            <g key={i}>
              {active && <circle cx={x} cy={y} r={13} style={{ fill: "rgba(228,87,46,0.12)", animation: "pulse 2s ease-in-out infinite" }} />}
              <circle cx={x} cy={y} r={4.5}
                style={{ fill: done ? "#E4572E" : "rgba(246,243,236,0.15)", transition: "fill .4s ease" }} />
              <text x={x + (x > W / 2 ? -14 : 13)} y={y + 4}
                style={{ fill: "rgba(246,243,236,0.28)", fontSize: 9, fontFamily: "'Geist Mono',monospace", letterSpacing: "0.08em" }}
                textAnchor={x > W / 2 ? "end" : "start"}>
                {String(i + 1).padStart(2, "0")}
              </text>
            </g>
          );
        })}

        {/* Traveler */}
        <g style={{ transform: `translate(${traveler.x}px,${traveler.y}px)`, transition: "transform .7s cubic-bezier(.4,0,.2,1)" }}>
          <circle cx={0} cy={0} r={10} style={{ fill: "rgba(246,243,236,0.1)" }} />
          <circle cx={0} cy={0} r={5} style={{ fill: "#F6F3EC" }} />
          <circle cx={0} cy={0} r={2.5} style={{ fill: "#E4572E" }} />
        </g>

        {/* Origin: São Paulo */}
        <circle cx={SP.x} cy={SP.y} r={6} style={{ fill: "rgba(232,184,74,0.85)" }} />
        <text x={SP.x - 12} y={SP.y - 12} textAnchor="end"
          style={{ fill: "rgba(246,243,236,0.7)", fontSize: 11, fontFamily: "'Geist Mono',monospace", letterSpacing: "0.06em" }}>São Paulo</text>
        <text x={SP.x - 12} y={SP.y + 2} textAnchor="end"
          style={{ fill: "rgba(246,243,236,0.32)", fontSize: 9, fontFamily: "'Geist Mono',monospace" }}>BR · GMT−3</text>

        {/* Destination: Toronto */}
        <circle cx={TO.x} cy={TO.y} r={6}
          style={{ fill: stepIdx >= 4 ? "#E4572E" : "rgba(246,243,236,0.28)", transition: "fill .5s ease" }} />
        <text x={TO.x + 14} y={TO.y - 4}
          style={{ fill: "rgba(246,243,236,0.7)", fontSize: 11, fontFamily: "'Geist Mono',monospace", letterSpacing: "0.06em" }}>Toronto</text>
        <text x={TO.x + 14} y={TO.y + 10}
          style={{ fill: "rgba(246,243,236,0.32)", fontSize: 9, fontFamily: "'Geist Mono',monospace" }}>CA · EST</text>

        {/* Status badge */}
        <rect x={148} y={162} width={116} height={52} rx={10}
          style={{ fill: "rgba(14,33,24,0.85)", stroke: "rgba(246,243,236,0.09)", strokeWidth: 1 }} />
        <text x={206} y={184} textAnchor="middle"
          style={{ fill: "#E4572E", fontSize: 9, fontFamily: "'Geist Mono',monospace", letterSpacing: "0.14em" }}>
          {String(stepIdx + 1).padStart(2, "0")} / 06
        </text>
        <text x={206} y={202} textAnchor="middle"
          style={{ fill: "rgba(246,243,236,0.75)", fontSize: 11, fontFamily: "'Instrument Serif',serif" }}>
          {["Apply","Screen","Offer","Relocate","Immerse","Ship"][stepIdx]}
        </text>
      </svg>
    </div>
  );
};

                  width: i === idx ? 28 : 6,
                  borderRadius: 3, border: "none", padding: 0, cursor: "pointer",
                  background: i < idx
                    ? "rgba(228,87,46,0.45)"
                    : i === idx ? "#E4572E" : "rgba(246,243,236,0.14)",
                  transition: "all .3s ease",
                }} />
              ))}
              <button onClick={() => setPlaying(p => !p)} style={{
                marginLeft: 10, border: "none", background: "none", cursor: "pointer",
                color: "rgba(246,243,236,0.32)", padding: "4px 8px",
                fontFamily: "var(--mono)", fontSize: 11, letterSpacing: "0.1em", textTransform: "uppercase",
                display: "flex", alignItems: "center", gap: 6, transition: "color .2s ease",
              }}
                onMouseEnter={e => e.currentTarget.style.color = "rgba(246,243,236,0.65)"}
                onMouseLeave={e => e.currentTarget.style.color = "rgba(246,243,236,0.32)"}
              >
                {playing
                  ? <svg width="11" height="11" viewBox="0 0 11 11" fill="currentColor"><rect x="1.5" y="1" width="3" height="9" rx="1"/><rect x="6.5" y="1" width="3" height="9" rx="1"/></svg>
                  : <svg width="11" height="11" viewBox="0 0 11 11" fill="currentColor"><path d="M2 1.5L10 5.5L2 9.5V1.5Z"/></svg>
                }
                {playing ? "Pause" : "Play"}
              </button>
              <button onClick={onApply} style={{
                marginLeft: "auto", border: "1px solid rgba(246,243,236,0.2)", borderRadius: 999,
                background: "none", cursor: "pointer", padding: "8px 16px",
                color: "rgba(246,243,236,0.7)", fontFamily: "var(--sans)", fontSize: 13,
                display: "flex", alignItems: "center", gap: 6, transition: "border-color .2s ease, color .2s ease",
              }}
                onMouseEnter={e => { e.currentTarget.style.borderColor = "rgba(246,243,236,0.6)"; e.currentTarget.style.color = "#F6F3EC"; }}
                onMouseLeave={e => { e.currentTarget.style.borderColor = "rgba(246,243,236,0.2)"; e.currentTarget.style.color = "rgba(246,243,236,0.7)"; }}
              >
                Apply now <Icon name="arrow-right" size={13} />
              </button>
            </div>
          </div>

          {/* Right: journey map */}
          <FlowJourneyMap stepIdx={idx} />
        </div>
      </div>

      {/* Ambient glow */}
      <div style={{
        position: "absolute", inset: 0, pointerEvents: "none",
        background: "radial-gradient(ellipse at 72% 50%, rgba(228,87,46,0.07) 0%, transparent 65%)",
      }} />
    </section>
  );
};

const App = () => {
  const [modalOpen, setModalOpen] = useState(false);
  const [tweaks, setTweaks] = useState(window.TWEAK_DEFAULTS);
  const [tweaksOpen, setTweaksOpen] = useState(false);
  const [activeSection, setActiveSection] = useState("program");

  // Apply tweaks to root
  useEffect(() => {
    document.body.setAttribute("data-accent", tweaks.accent);
    document.body.setAttribute("data-density", tweaks.density);
  }, [tweaks]);

  // Edit-mode protocol
  useEffect(() => {
    const handler = (e) => {
      if (!e.data || typeof e.data !== "object") return;
      if (e.data.type === "__activate_edit_mode") setTweaksOpen(true);
      if (e.data.type === "__deactivate_edit_mode") setTweaksOpen(false);
      if (e.data.type === "__edit_mode_keys") {
        if (e.data.keys) setTweaks(t => ({ ...t, ...e.data.keys }));
      }
    };
    window.addEventListener("message", handler);
    window.parent.postMessage({ type: "__edit_mode_available" }, "*");
    return () => window.removeEventListener("message", handler);
  }, []);

  // Section-spy for nav highlighting
  useEffect(() => {
    const ids = ["program", "how", "talent", "roadmap", "stories", "faq"];
    const observer = new IntersectionObserver(
      (entries) => {
        entries.forEach(e => {
          if (e.isIntersecting) setActiveSection(e.target.id);
        });
      },
      { rootMargin: "-40% 0px -50% 0px", threshold: 0 }
    );
    ids.forEach(id => {
      const el = document.getElementById(id);
      if (el) observer.observe(el);
    });
    return () => observer.disconnect();
  }, []);

  const onApply = () => setModalOpen(true);

  return (
    <>
      <Nav onApply={onApply} activeSection={activeSection} />
      <main id="program">
        <Hero onApply={onApply} variant={tweaks.heroVariant} />
        <FlowAnimation onApply={onApply} />
        <Ticker />
        {tweaks.showStats && <Stats />}
        <LogoRow />
        <div className="editorial-strip">
          <img src="assets/1.jpg" alt="Engineers on the move" />
        </div>
        <How onApply={onApply} />
        <Talent onApply={onApply} />
        <Roadmap />
        <Stories />
        <FAQ />
        <CTABand onApply={onApply} />
      </main>
      <Footer />

      <ApplyModal open={modalOpen} onClose={() => setModalOpen(false)} />

      {tweaksOpen && (
        <Tweaks tweaks={tweaks} setTweaks={setTweaks} onClose={() => setTweaksOpen(false)} />
      )}
    </>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
